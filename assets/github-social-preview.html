<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevChain Social Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .preview-container {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0f1117 0%, #1a1d2d 100%);
            border-radius: 12px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .preview-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .header {
            z-index: 1;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #7C3AED, #9F67FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 24px;
            color: #e2e8f0;
            font-weight: 500;
            line-height: 1.4;
        }
        .features {
            display: flex;
            gap: 20px;
            z-index: 1;
        }
        .feature {
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 8px;
            padding: 20px;
            flex: 1;
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .feature-title {
            font-size: 16px;
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 8px;
        }
        .feature-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.4;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            border-top: 1px solid rgba(124,58,237,0.2);
            padding-top: 30px;
        }
        .tech-stack {
            display: flex;
            gap: 15px;
        }
        .tech-item {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 600;
        }
        .badge {
            background: linear-gradient(135deg, #7C3AED, #9F67FF);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="header">
            <div class="logo">🚀 DevChain</div>
            <div class="tagline">Developer Marketplace with SHA-256 Verified Ownership</div>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🛍️</div>
                <div class="feature-title">Sell Products</div>
                <div class="feature-desc">Templates, tools, courses with instant delivery</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔐</div>
                <div class="feature-title">SHA-256 Security</div>
                <div class="feature-desc">Cryptographic ownership certificates</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">Instant Access</div>
                <div class="feature-desc">Automated file delivery & analytics</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="tech-stack">
                <div class="tech-item">React 19</div>
                <div class="tech-item">Node.js</div>
                <div class="tech-item">TypeScript</div>
                <div class="tech-item">Stripe</div>
            </div>
            <div class="badge">v1.0.0</div>
        </div>
    </div>
</body>
</html>
