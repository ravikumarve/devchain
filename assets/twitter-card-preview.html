<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevChain Twitter Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .preview-container {
            width: 1200px;
            height: 600px;
            background: linear-gradient(135deg, #0f1117 0%, #1a1d2d 100%);
            border-radius: 12px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .preview-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .logo {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #7C3AED, #9F67FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            z-index: 1;
        }
        .tagline {
            font-size: 28px;
            color: #e2e8f0;
            font-weight: 500;
            text-align: center;
            margin-bottom: 10px;
            z-index: 1;
        }
        .subtitle {
            font-size: 20px;
            color: #9F67FF;
            font-weight: 600;
            text-align: center;
            z-index: 1;
        }
        .tech-stack {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            z-index: 1;
        }
        .tech-item {
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            color: #e2e8f0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="logo">🚀 DevChain</div>
        <div class="tagline">Developer Marketplace</div>
        <div class="subtitle">SHA-256 Verified Ownership</div>
        <div class="tech-stack">
            <div class="tech-item">React 19</div>
            <div class="tech-item">Node.js</div>
            <div class="tech-item">TypeScript</div>
            <div class="tech-item">Stripe</div>
        </div>
    </div>
</body>
</html>
