<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevChain Demo Placeholder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .demo-container {
            width: 800px;
            height: 600px;
            background: linear-gradient(135deg, #0f1117 0%, #1a1d2d 100%);
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .demo-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 15px;
            text-align: center;
            z-index: 1;
        }
        .subtitle {
            font-size: 18px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            z-index: 1;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            z-index: 1;
        }
        .feature {
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .feature-text {
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 600;
        }
        .demo-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(124,58,237,0.2);
            border: 1px solid rgba(124,58,237,0.4);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #a78bfa;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-badge">DEMO</div>
        <div class="placeholder-icon">🎬</div>
        <div class="title">DevChain Demo</div>
        <div class="subtitle">Interactive marketplace walkthrough coming soon</div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🛍️</div>
                <div class="feature-text">Browse Products</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔐</div>
                <div class="feature-text">SHA-256 Security</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Instant Delivery</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Analytics Dashboard</div>
            </div>
        </div>
    </div>
</body>
</html>
