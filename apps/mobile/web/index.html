<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <!-- ─── Primary SEO ──────────────────────────────────── -->
  <title>DevChain — Blockchain-Powered Developer Marketplace</title>
  <meta name="description" content="Buy and sell developer tools, templates, and code. Every purchase backed by a blockchain ownership certificate. The marketplace where developers own their work." />
  <meta name="keywords" content="developer marketplace, code templates, React components, blockchain ownership, developer tools, freelance developers, buy sell code" />
  <meta name="author" content="DevChain" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://devchain.app" />

  <!-- ─── Open Graph (Facebook, LinkedIn) ─────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://devchain.app" />
  <meta property="og:title" content="DevChain — Blockchain-Powered Developer Marketplace" />
  <meta property="og:description" content="Buy and sell developer tools, templates, and code with blockchain ownership certificates." />
  <meta property="og:image" content="https://devchain.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="DevChain" />

  <!-- ─── Twitter Card ─────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@devchain_app" />
  <meta name="twitter:title" content="DevChain — Developer Marketplace" />
  <meta name="twitter:description" content="Buy and sell developer tools with blockchain ownership certificates." />
  <meta name="twitter:image" content="https://devchain.app/og-image.png" />

  <!-- ─── JSON-LD Structured Data (Google Rich Results) ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "DevChain",
    "url": "https://devchain.app",
    "description": "Blockchain-powered developer marketplace for buying and selling code, templates, and tools.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://devchain.app/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "DevChain",
    "url": "https://devchain.app",
    "logo": "https://devchain.app/logo.png",
    "sameAs": [
      "https://twitter.com/devchain_app",
      "https://github.com/ravikumarve/devchain"
    ]
  }
  </script>

  <!-- ─── PWA / Mobile ─────────────────────────────────── -->
  <meta name="theme-color" content="#7C3AED" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DevChain" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- ─── Performance ──────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://igrrgytacxqsetksrmqs.supabase.co" />

  <style>
    /* Prevent flash of unstyled content */
    #root, #main { background-color: #0a0a0a; min-height: 100vh; }
    body { margin: 0; background-color: #0a0a0a; }
  </style>
</head>
<body>
  <noscript>
    <div style="padding:20px;text-align:center;color:white;background:#0a0a0a;">
      DevChain requires JavaScript. Please enable it to use the marketplace.
    </div>
  </noscript>
  <div id="root"></div>
</body>
</html>
